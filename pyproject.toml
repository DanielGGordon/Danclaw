[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "danclaw"
version = "0.1.0"
description = "Multi-agent communication and automation platform"
requires-python = ">=3.11"
dependencies = [
    "aiosqlite",
    "aiohttp",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[tool.pytest.ini_options]
pythonpath = ["."]
